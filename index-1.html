<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRITICAL SYSTEM BREACH</title>
    <style>
        body {
            /* The blink animation: alternates between black and dark red */
            animation: blinker 0.2s infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        @keyframes blinker {
            0% { background-color: #000; }
            50% { background-color: #700; } /* Dark red for that alarm feel */
            100% { background-color: #000; }
        }

        #warning-text {
            color: #fff;
            font-size: 15vw; /* Oversized text */
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 20px #f00;
        }

        .cursor {
            display: inline-block;
            width: 20px;
            height: 60px;
            background-color: #fff;
            margin-left: 10px;
            vertical-align: middle;
            animation: cursorBlink 0.5s step-end infinite;
        }

        @keyframes cursorBlink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="container">
        <span id="warning-text"></span><span class="cursor"></span>
    </div>

<script>
    const text = "YOUR SYSTEM IS HACKED  by Mr. RAAZ!";
    const displayElement = document.getElementById('warning-text');
    let charIndex = 0;

    function typeEffect() {
        if (charIndex < text.length) {
            displayElement.innerHTML += text.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 50); // Speed of typing
        } else {
            // Wait a second, clear the text, and restart the loop
            setTimeout(() => {
                displayElement.innerHTML = "";
                charIndex = 0;
                typeEffect();
            }, 400);
        }
    }

    window.onload = typeEffect;
</script>

</body>
</html>
